services:
  app:
    image: ghcr.io/rasmusaasmae/portfolio:latest
    ports:
      - '${APP_PORT:-3000}:3000'
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
